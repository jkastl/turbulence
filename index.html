<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Turbulence Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #header {
    padding: 12px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1e1e2e;
  }
  #header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #c0c8ff;
  }
  #status {
    font-size: 11px;
    color: #666;
  }
  #status.active { color: #4ade80; }
  #version {
    font-size: 10px;
    color: #888;
    position: absolute;
    bottom: 6px;
    left: 8px;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #readout {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: #1a1a2a;
    border-top: 1px solid #1e1e2e;
  }
  .val-box {
    background: #0d0d1a;
    padding: 10px 12px;
    text-align: center;
  }
  .val-label {
    font-size: 10px;
    color: #556;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 2px;
  }
  .val-num {
    font-size: 18px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  #val-x .val-num { color: #f87171; }
  #val-y .val-num { color: #60a5fa; }
  #val-z .val-num { color: #a78bfa; }
  #start-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 24px rgba(79,70,229,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  #start-btn:active { background: #4338ca; }
  #controls {
    position: absolute;
    bottom: 8px;
    right: 8px;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #controls.visible { opacity: 1; }
  .ctrl-btn {
    background: rgba(255,255,255,0.07);
    color: #aaa;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.14); }
  .ctrl-btn.on {
    background: rgba(99,102,241,0.25);
    color: #c0c8ff;
    border-color: rgba(99,102,241,0.5);
  }
</style>
</head>
<body>

<div id="header">
  <h1>Turbulence Tracker</h1>
  <span id="status">Waiting</span>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <button id="start-btn">Enable Motion</button>
  <span id="version">v1.9</span>
  <div id="controls">
    <button class="ctrl-btn" id="btn-clear">Clear</button>
    <button class="ctrl-btn" id="btn-pause">Pause</button>
    <button class="ctrl-btn on" id="btn-smooth">Smooth</button>
    <button class="ctrl-btn on" id="btn-invert">Invert</button>
    <button class="ctrl-btn" id="btn-raw">Raw #s</button>
  </div>
</div>

<div id="readout">
  <div class="val-box" id="val-x">
    <div class="val-label">X &mdash; Left/Right</div>
    <div class="val-num" id="num-x">0.00</div>
  </div>
  <div class="val-box" id="val-y">
    <div class="val-label">Y &mdash; Fwd/Back</div>
    <div class="val-num" id="num-y">0.00</div>
  </div>
  <div class="val-box" id="val-z">
    <div class="val-label">Z &mdash; Vertical</div>
    <div class="val-num" id="num-z">0.00</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('start-btn');
  const controls = document.getElementById('controls');
  const numX = document.getElementById('num-x');
  const numY = document.getElementById('num-y');
  const numZ = document.getElementById('num-z');
  const btnClear  = document.getElementById('btn-clear');
  const btnPause  = document.getElementById('btn-pause');
  const btnSmooth = document.getElementById('btn-smooth');
  const btnInvert = document.getElementById('btn-invert');
  const btnRaw    = document.getElementById('btn-raw');

  // Each point is the raw acceleration sample {x, y} in m/s²
  // Center of canvas = (0,0) = calm. Distance from center = turbulence intensity.
  const MAX_HISTORY = 900; // ~15 seconds at 60 Hz
  const history = [];

  let paused = false;
  let started = false;
  let optSmooth = true;
  let optInvert = true;
  let optRaw    = false; // tracks visibility of readout
  let cx = 0, cy = 0;
  let dpr = window.devicePixelRatio || 1;

  // Scale: px per m/s² — sized so ±MAX_G fills the canvas radius
  const MAX_G = 4; // m/s² — severe turbulence threshold
  let scale = 1; // recomputed in resizeCanvas

  // Smoothed values — used for both readout and history
  let curX = 0, curY = 0, curZ = 0;
  const SMOOTH = 0.08;

  // Peak magnitude for the level badge (decays over time)
  let peakMag = 0;
  const PEAK_DECAY = 0.995; // per frame

  // Turbulence level thresholds (m/s²)
  const LEVELS = [
    { label: 'Severe',   min: 3.0, color: '#ff4444' },
    { label: 'Moderate', min: 1.2, color: '#fb923c' },
    { label: 'Light',    min: 0.3, color: '#facc15' },
    { label: 'Calm',     min: 0,   color: '#4ade80' },
  ];

  function getLevel(mag) {
    return LEVELS.find(l => mag >= l.min) || LEVELS[LEVELS.length - 1];
  }

  function resizeCanvas() {
    const wrap = canvas.parentElement;
    dpr = window.devicePixelRatio || 1;
    canvas.width = wrap.clientWidth * dpr;
    canvas.height = wrap.clientHeight * dpr;
    canvas.style.width = wrap.clientWidth + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
    cx = canvas.width / 2;
    cy = canvas.height / 2;
    // Fit MAX_G into 90% of the smaller half-dimension
    scale = Math.min(cx, cy) * 0.9 / MAX_G;
    draw();
  }

  function fmt(v) {
    return (v >= 0 ? '+' : '') + v.toFixed(2);
  }

  function draw() {
    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, w, h);

    if (!started) return;

    drawRings();

    if (history.length < 2) return;

    // Decay peak
    peakMag *= PEAK_DECAY;

    // Draw trail as bezier spline — midpoints are on-curve, history points are control points
    const n = history.length;
    const sx = i => optInvert ? cx - history[i].x * scale : cx + history[i].x * scale;
    const sy = i => optInvert ? cy + history[i].y * scale : cy - history[i].y * scale;

    for (let i = 1; i < n; i++) {
      const t = i / n;
      const alpha = Math.pow(t, 1.5) * 0.88 + 0.04;

      // Start at midpoint of previous segment, end at midpoint of this segment
      const x0 = i === 1     ? sx(0) : (sx(i - 2) + sx(i - 1)) / 2;
      const y0 = i === 1     ? sy(0) : (sy(i - 2) + sy(i - 1)) / 2;
      const x2 = i === n - 1 ? sx(n - 1) : (sx(i - 1) + sx(i)) / 2;
      const y2 = i === n - 1 ? sy(n - 1) : (sy(i - 1) + sy(i)) / 2;

      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.quadraticCurveTo(sx(i - 1), sy(i - 1), x2, y2);

      const r = Math.round(t * 248 + (1 - t) * 60);
      const g = Math.round(t * 80  + (1 - t) * 130);
      const b = Math.round(t * 72  + (1 - t) * 250);
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
      ctx.lineWidth = (0.8 + t * 2.2) * dpr;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Current dot
    const head = history[history.length - 1];
    const hx = optInvert ? cx - head.x * scale : cx + head.x * scale;
    const hy = optInvert ? cy + head.y * scale : cy - head.y * scale;

    ctx.beginPath();
    ctx.arc(hx, hy, 4.5 * dpr, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    const pulse = (Date.now() % 1000) / 1000;
    ctx.beginPath();
    ctx.arc(hx, hy, (4.5 + pulse * 12) * dpr, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${(1 - pulse) * 0.35})`;
    ctx.lineWidth = 1.5 * dpr;
    ctx.stroke();

    // Turbulence level badge (top center)
    const lvl = getLevel(peakMag);
    ctx.font = `600 ${13 * dpr}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = lvl.color;
    ctx.fillText(lvl.label.toUpperCase(), cx, 10 * dpr);

    drawZBar(optInvert ? -head.z : head.z);
  }

  function drawRings() {
    // Rings at 1, 2, 4 m/s² with labels
    const rings = [
      { r: 1,   label: '1',  alpha: 0.15 },
      { r: 2,   label: '2',  alpha: 0.12 },
      { r: MAX_G, label: `${MAX_G}`, alpha: 0.09 },
    ];

    // Crosshair axes
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();

    ctx.font = `${9 * dpr}px -apple-system, sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillText('+X', cx + 4, cy - 8 * dpr);
    ctx.textAlign = 'center';
    ctx.fillText('+Y', cx, 4 * dpr + 8 * dpr);

    rings.forEach(({ r, label, alpha }) => {
      const pr = r * scale;
      ctx.beginPath();
      ctx.arc(cx, cy, pr, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Label at the right edge of each ring
      ctx.fillStyle = `rgba(255,255,255,${alpha * 1.8})`;
      ctx.font = `${9 * dpr}px -apple-system, sans-serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, cx + pr + 3 * dpr, cy);
    });

    ctx.restore();
  }

  function drawZBar(z) {
    // Vertical bar on the right edge: center = 0, up = positive Z, down = negative Z
    const barW = 10 * dpr;
    const barH = canvas.height * 0.6;
    const barX = canvas.width - barW - 4 * dpr;
    const barY = cy - barH / 2;

    // Track background
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 4 * dpr);
    ctx.fill();

    // Fill from center outward
    const clampedZ = Math.max(-MAX_G, Math.min(MAX_G, z || 0));
    const fillH = Math.abs(clampedZ) / MAX_G * (barH / 2);
    const fillY = clampedZ >= 0 ? cy - fillH : cy;
    const zT = Math.abs(clampedZ) / MAX_G; // 0..1
    const zR = Math.round(zT * 168 + (1 - zT) * 100);
    const zG = Math.round(zT * 85  + (1 - zT) * 180);
    const zB = Math.round(zT * 220 + (1 - zT) * 200);
    ctx.fillStyle = `rgba(${zR},${zG},${zB},0.75)`;
    ctx.beginPath();
    ctx.roundRect(barX, fillY, barW, Math.max(fillH, 1), 3 * dpr);
    ctx.fill();

    // Center tick
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(barX, cy);
    ctx.lineTo(barX + barW, cy);
    ctx.stroke();

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = `${9 * dpr}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Z', barX + barW / 2, barY - 2 * dpr);

    ctx.restore();
  }

  function onMotion(e) {
    if (paused) return;

    const acc = e.acceleration;
    if (!acc) return;

    const ax = acc.x || 0;
    const ay = acc.y || 0;
    const az = acc.z || 0;

    // Always update EMA
    curX += (ax - curX) * SMOOTH;
    curY += (ay - curY) * SMOOTH;
    curZ += (az - curZ) * SMOOTH;

    const px = optSmooth ? curX : ax;
    const py = optSmooth ? curY : ay;
    const pz = optSmooth ? curZ : az;

    // Track peak magnitude for level badge
    const mag = Math.sqrt(px * px + py * py);
    if (mag > peakMag) peakMag = mag;

    history.push({ x: px, y: py, z: pz });
    if (history.length > MAX_HISTORY) history.shift();

    numX.textContent = fmt(curX);
    numY.textContent = fmt(curY);
    numZ.textContent = fmt(curZ);
  }

  function startTracking() {
    window.addEventListener('devicemotion', onMotion);
    statusEl.textContent = 'Live';
    statusEl.classList.add('active');
    controls.classList.add('visible');
    started = true;
    loop();
  }

  function requestPermission() {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            startBtn.style.display = 'none';
            startTracking();
          } else {
            statusEl.textContent = 'Permission denied';
          }
        })
        .catch(err => {
          statusEl.textContent = 'Error: ' + err.message;
        });
    } else {
      startBtn.style.display = 'none';
      startTracking();
    }
  }

  let animId;
  function loop() {
    draw();
    animId = requestAnimationFrame(loop);
  }

  btnClear.addEventListener('click', () => {
    history.length = 0;
    peakMag = 0;
  });

  function makeToggle(btn, getter, setter) {
    btn.addEventListener('click', () => {
      setter(!getter());
      btn.classList.toggle('on', getter());
    });
  }
  makeToggle(btnSmooth, () => optSmooth, v => { optSmooth = v; });
  makeToggle(btnInvert, () => optInvert, v => { optInvert = v; });
  const readout = document.getElementById('readout');
  readout.style.display = 'none';
  btnRaw.addEventListener('click', () => {
    optRaw = !optRaw;
    btnRaw.classList.toggle('on', optRaw);
    readout.style.display = optRaw ? '' : 'none';
  });

  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent = paused ? 'Resume' : 'Pause';
    statusEl.textContent = paused ? 'Paused' : 'Live';
    if (paused) statusEl.classList.remove('active');
    else statusEl.classList.add('active');
  });

  startBtn.addEventListener('click', requestPermission);
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
})();
</script>
</body>
</html>
